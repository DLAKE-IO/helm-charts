{{- if .Values.valkey.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "celery.fullname" . }}-test-connection"
  labels:
    {{- include "celery.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: redis-ping
      image: redis:7-alpine
      command:
        - sh
        - -c
        - redis-cli -h {{ include "celery.valkey.serviceName" . }} ping | grep -q PONG
  restartPolicy: Never
{{- else if .Values.flower.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "celery.fullname" . }}-test-connection"
  labels:
    {{- include "celery.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:1.37.0
      command:
        - wget
        - --spider
        - "http://{{ include "celery.fullname" . }}-flower:{{ .Values.flower.service.port }}"
  restartPolicy: Never
{{- end }}
