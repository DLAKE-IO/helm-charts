# Default values for celery.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Worker and beat image.
# IMPORTANT: The default library/celery image is deprecated (unmaintained since 2017).
# Replace with your own image built from https://github.com/celery/celery/blob/main/docker/Dockerfile
image:
  repository: celery
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 2000

# Default security context applied to worker and flower containers.
# Beat overrides readOnlyRootFilesystem: false when scheduler=default (must write schedule file).
securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

##
## Celery application configuration
##
celery:
  # REQUIRED when worker.command and beat.command are both empty.
  # e.g. "myproject.celery" — used as: celery -A myproject.celery worker
  app: ""

  # Broker and result backend URLs — used when valkey.enabled=false.
  # When valkey.enabled=true these are auto-constructed from the Valkey service name.
  brokerUrl: ""        # e.g. "redis://myhost:6379/0"
  resultBackend: ""    # e.g. "redis://myhost:6379/1"

  # Reference an existing Secret containing broker-url and result-backend keys.
  # When set, takes precedence over brokerUrl/resultBackend and the chart does not
  # create its own Secret.
  existingSecret: ""
  existingSecretBrokerKey: "broker-url"
  existingSecretBackendKey: "result-backend"

  # Extra environment variables injected into worker, beat, AND flower containers.
  ## @param celery.extraEnv Extra environment variables
  extraEnv: []
  # - name: CELERY_TASK_SERIALIZER
  #   value: json

##
## Worker Deployment
##
worker:
  ## @param worker.replicaCount Number of worker replicas
  replicaCount: 1

  # Override the full command. When set, celery.app is not required and the default
  # exec probes are omitted (provide worker.livenessProbe / worker.readinessProbe instead).
  # Default (when empty): ["celery", "-A", "<celery.app>", "worker", "--loglevel=info"]
  command: []

  # Extra arguments appended to the default command (ignored when command is set).
  extraArgs: []

  resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 256Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Override probes — used when worker.command is set (default probes are omitted in that case).
  livenessProbe: {}
  readinessProbe: {}

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

##
## Beat Deployment (singleton periodic task scheduler — opt-in)
##
beat:
  ## @param beat.enabled Enable the Celery beat scheduler
  enabled: false

  # Scheduler backend:
  #   "default"  — file-based (Python shelve). Writes to /data/celerybeat-schedule.
  #                Requires a writable /data volume (emptyDir or PVC).
  #                Schedule is lost on pod restart unless persistence.enabled=true.
  #   "redbeat"  — Redis-backed (requires celery-redbeat installed in your image).
  #                pip install celery-redbeat
  #                Schedule stored in Valkey/Redis. Survives restarts. No PVC needed.
  scheduler: "default"

  # Override the full command. When set, celery.app is not required.
  # Default (scheduler=default): ["celery","-A","<app>","beat","--loglevel=info","--schedule=/data/celerybeat-schedule"]
  # Default (scheduler=redbeat): ["celery","-A","<app>","beat","--loglevel=info","--scheduler","redbeat.RedBeatScheduler"]
  command: []

  # Extra arguments appended to the default command (ignored when command is set).
  extraArgs: []

  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Persistence for the beat schedule file (only used when scheduler=default).
  # WARNING: emptyDir (enabled=false) means the schedule is lost on pod restart.
  # For production, set enabled=true and use a networked storageClass to avoid
  # node-binding issues if the beat pod is rescheduled to a different node.
  persistence:
    enabled: false
    storageClass: ""
    size: 1Gi
    accessMode: ReadWriteOnce

##
## Flower monitoring dashboard
##
flower:
  ## @param flower.enabled Enable the Flower monitoring dashboard
  enabled: true

  image:
    repository: mher/flower
    pullPolicy: IfNotPresent
    tag: "2.0"

  ## @param flower.replicaCount Number of Flower replicas
  replicaCount: 1

  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Extra arguments passed to flower (e.g. ["--basic_auth=user:pass"])
  extraArgs: []

  service:
    type: ClusterIP
    port: 5555

  ingress:
    enabled: false
    className: ""
    annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    hosts:
      - host: celery-flower.example.com
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls: []
    # - secretName: celery-flower-tls
    #   hosts:
    #     - celery-flower.example.com

##
## Official Valkey chart (broker + result backend)
## Repo: helm repo add valkey https://valkey.io/valkey-helm/
## ref: https://github.com/valkey-io/valkey-helm
##
## NOTE: This is the official Valkey chart, NOT the Bitnami chart.
## Its values schema differs from charts/bookstack and charts/cryptgeon
## which use the Bitnami Valkey chart.
##
valkey:
  ## Deploy Valkey using the bundled chart.
  ## To use an external Redis-compatible broker, set this to false
  ## and configure celery.brokerUrl / celery.resultBackend.
  enabled: true
  replica:
    enabled: false   # standalone mode (single pod)

## @param extraVolumes Extra volumes for all pods
extraVolumes: []
## @param extraVolumeMounts Extra volume mounts for all containers
extraVolumeMounts: []
