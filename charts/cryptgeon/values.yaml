# Default values for cryptgeon.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: cupcakearmy/cryptgeon
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

cryptgeon:
  # Max size for body. Accepted values according to byte-unit.
  # 512 MiB is the maximum allowed.
  # The frontend will show that number including the ~35% encoding overhead.
  size_limit: "1 KiB"
  # Maximal number of views.
  max_views: 100
  # Maximal expiration in minutes.
  max_expiration: 360
  # Allow custom configuration. If set to false all notes will be one view only.
  allow_advanced: "true"
  # Verbosity level for the backend. Possible values are: error, warn, info, debug, trace
  verbosity: "warn"
  # Custom image for replacing the logo. Must be publicly reachable
  theme_image:	""
  # Custom text for replacing the description below the logo
  theme_text:	""
  # Custom text the page title
  theme_page_title:	""
  # Custom url for the favicon. Must be publicly reachable
  theme_favicon:	""

## @param extraVolumes Optionally specify extra list of additional volumes for cryptgeon pods
##
extraVolumes: []
## @param extraVolumeMounts Optionally specify extra list of additional volumeMounts for cryptgeon container(s)
##
extraVolumeMounts: []

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

##
## Valkey subchart configuration
## ref: https://github.com/bitnami/charts/tree/main/bitnami/valkey
##
valkey:
  ## Deploy Valkey using the bundled chart.
  # To use an external Redis-compatible instance instead, set this to false
  # and configure the settings under externalValkey.
  enabled: true
  auth:
    enabled: false
  primary:
    persistence:
      enabled: false
  replica:
    persistence:
      enabled: false

##
## External Valkey / Redis configuration
## Used when valkey.enabled is false.
##
externalValkey:
  # Existing secret containing the Valkey/Redis connection URI.
  # Secret content must follow the format documented at:
  # https://docs.rs/redis/latest/redis/#connection-parameters
  existingSecretName: ""
  existingSecretKey: redis-connection

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

## Gateway API HTTPRoute (alternative to ingress). Requires the Gateway API
## CRDs and a pre-existing Gateway owned by the cluster admin. TLS is terminated
## at the Gateway listener, not here. ingress and httpRoute toggle independently.
httpRoute:
  enabled: false
  ## The existing Gateway(s) this route attaches to.
  parentRefs:
    - name: ""            # REQUIRED when enabled: the Gateway's name
      # namespace: ""     # omit if the Gateway is in the release namespace
      # sectionName: ""   # the listener to bind, e.g. "https"
      #                   # REQUIRED when httpsRedirect is enabled (the HTTPS listener)
  ## Hostnames this route answers for (route-level, not per-path).
  hostnames: []
    # - notes.example.com
  ## Path matches; the backendRef to the app service is implicit.
  paths:
    - type: PathPrefix
      value: /
  ## Extra annotations on the HTTPRoute object.
  annotations: {}
  ## HTTP -> HTTPS redirect: a secondary HTTPRoute on the HTTP (:80) listener
  ## carrying a RequestRedirect filter. On by default; only acts when
  ## httpRoute.enabled AND an HTTP listener is identified below. When enabled,
  ## the app route above MUST pin its HTTPS listener via parentRefs[].sectionName
  ## (an unpinned route binds all listeners incl. :80 and would loop).
  httpsRedirect:
    enabled: true
    sectionName: ""             # the HTTP (:80) listener on the same Gateway
    statusCode: 301
    # parentRefs: []            # optional: override to a different Gateway/listener

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}
