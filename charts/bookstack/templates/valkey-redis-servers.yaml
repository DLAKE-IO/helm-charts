{{- if and .Values.valkey.enabled .Values.valkey.auth.enabled }}
{{- $connBase := printf "%s-primary:6379:0" (include "bookstack.valkey.fullname" .) }}
{{- $password  := include "bookstack.valkeyPassword" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-redis-servers" (include "bookstack.fullname" .) }}
  labels:
    {{- include "bookstack.labels" . | nindent 4 }}
type: Opaque
data:
  {{- /*
    Stores the full BookStack REDIS_SERVERS connection string as host:port:db:password.
    The password is sourced via Helm lookup from valkey.auth.existingSecret (preferred)
    or from the inline valkey.auth.password value.
    The Deployment consumes this key via valueFrom.secretKeyRef so the password never
    appears as a plain environment variable in the pod spec.
  */}}
  redis-servers: {{ printf "%s:%s" $connBase $password | b64enc | quote }}
{{- end }}
