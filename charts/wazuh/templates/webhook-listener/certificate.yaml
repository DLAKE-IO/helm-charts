{{- if and .Values.webhookListener.enabled .Values.certificates.enabled (not .Values.webhookListener.tls.existingSecret) }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "wazuh.fullname" . }}-webhook-listener
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ include "wazuh.fullname" . }}-webhook-listener-tls
  privateKey:
    algorithm: RSA
    encoding: PKCS8
    size: 2048
  duration: {{ .Values.certificates.duration }}
  renewBefore: {{ .Values.certificates.renewBefore }}
  isCA: false
  commonName: {{ include "wazuh.fullname" . }}-webhook-listener
  subject:
    organizations:
      - {{ .Values.certificates.subject.organization }}
    countries:
      - {{ .Values.certificates.subject.country }}
    localities:
      - {{ .Values.certificates.subject.locality }}
  dnsNames:
    - {{ include "wazuh.fullname" . }}-webhook-listener
    - {{ include "wazuh.fullname" . }}-webhook-listener.{{ .Release.Namespace }}
    - {{ include "wazuh.fullname" . }}-webhook-listener.{{ .Release.Namespace }}.svc
    - {{ include "wazuh.fullname" . }}-webhook-listener.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    name: {{ .Values.certificates.issuer.name | default (printf "%s-ca-issuer" (include "wazuh.fullname" .)) }}
    group: cert-manager.io
    {{- if eq .Values.certificates.issuer.type "ClusterIssuer" }}
    kind: ClusterIssuer
    {{- else }}
    kind: Issuer
    {{- end }}
{{- end }}
