{{- if and .Values.webhookListener.enabled (not .Values.certificates.enabled) (not .Values.webhookListener.tls.existingSecret) }}
{{- fail "webhookListener requires either certificates.enabled=true or webhookListener.tls.existingSecret to be set" }}
{{- end }}
{{- if .Values.webhookListener.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "wazuh.fullname" . }}-webhook-script
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "wazuh.fullname" . }}-webhook-listener
data:
  kubernetes-webhook.py: |
    #!/var/ossec/framework/python/bin/python3

    import json
    import os
    import ssl
    from http.server import HTTPServer, BaseHTTPRequestHandler
    from socket import socket, AF_UNIX, SOCK_DGRAM

    PORT     = int(os.getenv('WEBHOOK_PORT', '8080'))
    CERT     = os.getenv('WEBHOOK_CERT', '/certs/tls.crt')
    CERT_KEY = os.getenv('WEBHOOK_CERT_KEY', '/certs/tls.key')

    socket_addr = '/var/ossec/queue/sockets/queue'

    def send_event(msg):
        string = '1:k8s:{0}'.format(json.dumps(msg))
        sock = socket(AF_UNIX, SOCK_DGRAM)
        sock.connect(socket_addr)
        sock.send(string.encode())
        sock.close()

    class WebhookHandler(BaseHTTPRequestHandler):
        def do_POST(self):
            content_length = int(self.headers.get('Content-Length', 0))
            body = self.rfile.read(content_length)
            try:
                data = json.loads(body)
                send_event(data)
                self.send_response(200)
            except Exception as e:
                print('Error: {0}'.format(e))
                self.send_response(500)
            self.end_headers()

        def log_message(self, format, *args):
            print(format % args)

    if __name__ == '__main__':
        httpd = HTTPServer(('0.0.0.0', PORT), WebhookHandler)
        ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)
        ctx.load_cert_chain(CERT, CERT_KEY)
        httpd.socket = ctx.wrap_socket(httpd.socket, server_side=True)
        print('Listening on 0.0.0.0:{0}'.format(PORT))
        httpd.serve_forever()
{{- end }}
